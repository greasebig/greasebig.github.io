<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Stats – greasebig</title>
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><defs><linearGradient id='a' x1='0%25' y1='0%25' x2='100%25' y2='100%25'><stop offset='0%25' stop-color='%236366f1'/><stop offset='100%25' stop-color='%23ec4899'/></linearGradient><filter id='g'><feGaussianBlur stdDeviation='2' result='b'/><feMerge><feMergeNode in='b'/><feMergeNode in='SourceGraphic'/></feMerge></filter></defs><rect width='100' height='100' rx='20' fill='%230a0a1a'/><circle cx='50' cy='50' r='38' fill='none' stroke='url(%23a)' stroke-width='2.5' opacity='0.4'/><circle cx='50' cy='50' r='28' fill='none' stroke='url(%23a)' stroke-width='1.5' opacity='0.6' stroke-dasharray='4 6'/><circle cx='50' cy='50' r='18' fill='none' stroke='%23fff' stroke-width='1' opacity='0.3'/><g filter='url(%23g)'><path d='M50 16 L56 34 L50 28 L44 34 Z' fill='%23fff' opacity='0.9'/><path d='M50 84 L44 66 L50 72 L56 66 Z' fill='%23fff' opacity='0.9'/><path d='M16 50 L34 44 L28 50 L34 56 Z' fill='%23fff' opacity='0.9'/><path d='M84 50 L66 56 L72 50 L66 44 Z' fill='%23fff' opacity='0.9'/></g><circle cx='50' cy='50' r='6' fill='url(%23a)'/><circle cx='50' cy='50' r='3' fill='%23fff'/><circle cx='50' cy='12' r='2.5' fill='%236366f1'/><circle cx='50' cy='88' r='2.5' fill='%23ec4899'/><circle cx='12' cy='50' r='2.5' fill='%238b5cf6'/><circle cx='88' cy='50' r='2.5' fill='%23f59e0b'/><circle cx='23' cy='23' r='2' fill='%2310b981' opacity='0.7'/><circle cx='77' cy='23' r='2' fill='%23ec4899' opacity='0.7'/><circle cx='23' cy='77' r='2' fill='%236366f1' opacity='0.7'/><circle cx='77' cy='77' r='2' fill='%238b5cf6' opacity='0.7'/></svg>" type="image/svg+xml" />
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&family=Playfair+Display:ital,wght@0,600;0,700;1,600&display=swap');

    :root {
      --ink: #1a1a2e;
      --muted: #a0a4b8;
      --glass: rgba(255,255,255,0.12);
      --glass-hover: rgba(255,255,255,0.20);
      --accent: #6366f1;
      --accent-2: #ec4899;
      --accent-3: #f59e0b;
      --accent-4: #10b981;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: "Inter", system-ui, -apple-system, sans-serif;
      color: #fff;
      overflow-x: hidden;
      min-height: 100vh;
      background: #0a0a1a;
    }

    /* ===== 毛玻璃初始背景（和主页一致） ===== */
    .bg-initial {
      position: fixed;
      top: 0; left: 0;
      width: 100vw; height: 100vh;
      z-index: -3;
      background:
        radial-gradient(800px 500px at 15% 0%, rgba(99,102,241,0.15), transparent 50%),
        radial-gradient(700px 450px at 85% 10%, rgba(236,72,153,0.10), transparent 50%),
        radial-gradient(600px 400px at 50% 80%, rgba(16,185,129,0.08), transparent 50%),
        linear-gradient(175deg, #0f0f23 0%, #1a1a2e 40%, #1e1e3f 70%, #0f0f23 100%);
    }

    /* floating orbs（和主页一致） */
    .orb {
      position: fixed;
      border-radius: 50%;
      filter: blur(60px);
      opacity: 0.35;
      pointer-events: none;
      z-index: -2;
    }
    .orb-1 { width: 360px; height: 360px; left: -100px; top: -80px; background: radial-gradient(circle, rgba(99,102,241,0.35), transparent 70%); animation: drift 12s ease-in-out infinite; }
    .orb-2 { width: 280px; height: 280px; right: -60px; top: 200px; background: radial-gradient(circle, rgba(236,72,153,0.28), transparent 70%); animation: drift 14s ease-in-out infinite 2s; }
    .orb-3 { width: 240px; height: 240px; left: 40%; bottom: -80px; background: radial-gradient(circle, rgba(16,185,129,0.22), transparent 70%); animation: drift 16s ease-in-out infinite 4s; }
    @keyframes drift {
      0%, 100% { transform: translate(0, 0) scale(1); }
      25% { transform: translate(20px, -15px) scale(1.05); }
      50% { transform: translate(-10px, 10px) scale(0.95); }
      75% { transform: translate(15px, 5px) scale(1.02); }
    }

    /* ===== Video Background ===== */
    .video-bg {
      position: fixed;
      top: 0; left: 0;
      width: 100vw; height: 100vh;
      z-index: -1;
      overflow: hidden;
      opacity: 0;
      transition: opacity 1.5s ease;
    }
    .video-bg.visible {
      opacity: 1;
    }
    .video-bg video {
      position: absolute;
      top: 50%; left: 50%;
      min-width: 100%; min-height: 100%;
      width: auto; height: auto;
      transform: translate(-50%, -50%);
      object-fit: cover;
    }
    .video-bg::after {
      content: '';
      position: absolute;
      inset: 0;
      background: linear-gradient(
        180deg,
        rgba(10,10,26,0.55) 0%,
        rgba(10,10,26,0.35) 40%,
        rgba(10,10,26,0.65) 100%
      );
      z-index: 1;
    }

    /* Loading indicator */
    .video-loading {
      position: fixed;
      bottom: 20px; right: 20px;
      z-index: 100;
      background: rgba(15,15,35,0.7);
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
      border: 1px solid rgba(99,102,241,0.2);
      color: #c7c7ff;
      font-size: 11px;
      font-weight: 500;
      padding: 8px 16px;
      border-radius: 20px;
      opacity: 0;
      transition: opacity 0.5s;
      display: flex;
      align-items: center;
      gap: 8px;
    }
    .video-loading.visible { opacity: 1; }
    .video-loading .vlb-dot {
      width: 6px; height: 6px;
      border-radius: 50%;
      background: var(--accent);
      animation: vlbPulse 1.2s ease-in-out infinite;
      flex-shrink: 0;
    }
    .video-loading .vlb-dot.done {
      background: var(--accent-4);
      animation: none;
    }
    @keyframes vlbPulse {
      0%, 100% { opacity: 1; transform: scale(1); }
      50% { opacity: 0.4; transform: scale(0.7); }
    }

    /* ===== Main Content ===== */
    .container {
      position: relative;
      z-index: 2;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 40px 20px;
    }

    /* Back button */
    .back-btn {
      position: fixed;
      top: 24px; left: 24px;
      z-index: 10;
      display: flex;
      align-items: center;
      gap: 6px;
      color: rgba(255,255,255,0.7);
      text-decoration: none;
      font-size: 14px;
      font-weight: 500;
      padding: 8px 16px;
      border-radius: 10px;
      background: rgba(255,255,255,0.08);
      backdrop-filter: blur(12px);
      border: 1px solid rgba(255,255,255,0.12);
      transition: all 0.25s;
    }
    .back-btn:hover {
      color: #fff;
      background: rgba(255,255,255,0.15);
    }
    .back-btn svg {
      width: 16px; height: 16px;
    }

    /* Title */
    .page-title {
      font-family: "Playfair Display", serif;
      font-size: clamp(28px, 5vw, 42px);
      font-weight: 700;
      letter-spacing: -0.02em;
      margin-bottom: 8px;
      background: linear-gradient(135deg, #fff 0%, #c7c7ff 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }
    .page-subtitle {
      color: var(--muted);
      font-size: 15px;
      margin-bottom: 48px;
      font-weight: 400;
    }

    /* Stats Grid */
    .stats-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(260px, 1fr));
      gap: 24px;
      max-width: 900px;
      width: 100%;
    }

    .stat-card {
      background: var(--glass);
      backdrop-filter: blur(24px);
      border: 1px solid rgba(255,255,255,0.12);
      border-radius: 20px;
      padding: 32px 28px;
      text-align: center;
      transition: all 0.35s cubic-bezier(0.4, 0, 0.2, 1);
      position: relative;
      overflow: hidden;
      text-decoration: none;
      color: inherit;
      display: block;
    }
    .stat-card::before {
      content: '';
      position: absolute;
      inset: 0;
      border-radius: 20px;
      padding: 1px;
      background: linear-gradient(135deg, rgba(255,255,255,0.15), transparent 60%);
      -webkit-mask: linear-gradient(#fff 0 0) content-box, linear-gradient(#fff 0 0);
      -webkit-mask-composite: xor;
      mask-composite: exclude;
      pointer-events: none;
    }
    .stat-card:hover {
      background: var(--glass-hover);
      transform: translateY(-4px);
      box-shadow: 0 20px 60px rgba(0,0,0,0.3);
    }

    .stat-icon {
      font-size: 36px;
      margin-bottom: 16px;
      display: block;
    }

    .stat-number {
      font-size: 56px;
      font-weight: 900;
      letter-spacing: -0.03em;
      line-height: 1;
      margin-bottom: 4px;
      font-variant-numeric: tabular-nums;
    }
    .stat-card:nth-child(1) .stat-number { color: var(--accent); }
    .stat-card:nth-child(2) .stat-number { color: var(--accent-3); }
    .stat-card:nth-child(3) .stat-number { color: var(--accent-4); }

    .stat-label {
      font-size: 16px;
      font-weight: 600;
      color: rgba(255,255,255,0.85);
      margin-bottom: 4px;
    }
    .stat-desc {
      font-size: 13px;
      color: var(--muted);
      font-weight: 400;
    }

    /* Updated time */
    .updated-at {
      margin-top: 40px;
      font-size: 12px;
      color: rgba(255,255,255,0.3);
    }

    @media (max-width: 640px) {
      .stats-grid { grid-template-columns: 1fr; gap: 16px; }
      .stat-number { font-size: 42px; }
      .stat-card { padding: 24px 20px; }
    }

    @media (prefers-reduced-motion: reduce) {
      .video-bg { display: none; }
      .video-loading { display: none; }
      .orb { animation: none; }
    }
  </style>
</head>
<body>

  <!-- 毛玻璃初始背景 -->
  <div class="bg-initial"></div>
  <div class="orb orb-1"></div>
  <div class="orb orb-2"></div>
  <div class="orb orb-3"></div>

  <!-- Video Background: 480p → large progressive loading -->
  <div class="video-bg" id="videoBg">
    <video id="bgVideo" autoplay muted loop playsinline></video>
  </div>

  <!-- Loading indicator -->
  <div class="video-loading" id="videoLoading">
    <span class="vlb-dot"></span>
    <span class="vlb-text">Loading video…</span>
  </div>

  <!-- Back button -->
  <a class="back-btn" href="/">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="19" y1="12" x2="5" y2="12"/><polyline points="12 19 5 12 12 5"/></svg>
    Back
  </a>

  <!-- Main content -->
  <div class="container">
    <h1 class="page-title">Stats</h1>
    <p class="page-subtitle">Live numbers from the greasebig ecosystem</p>

    <div class="stats-grid">
      <a class="stat-card" href="https://greasebig.github.io/" target="_blank" rel="noopener">
        <span class="stat-icon">✍️</span>
        <div class="stat-number" id="numArticles">0</div>
        <div class="stat-label">Articles</div>
        <div class="stat-desc">Fresh Tech Reposts &amp; original posts</div>
      </a>
      <a class="stat-card" href="https://greasebig.github.io/daily-video-papers/" target="_blank" rel="noopener">
        <span class="stat-icon">📚</span>
        <div class="stat-number" id="numPapers">0</div>
        <div class="stat-label">Papers Hub</div>
        <div class="stat-desc">Daily arXiv paper tracker</div>
      </a>
      <a class="stat-card" href="https://greasebig.github.io/awesome-agent-everything/" target="_blank" rel="noopener">
        <span class="stat-icon">🤖</span>
        <div class="stat-number" id="numAgents">0</div>
        <div class="stat-label">Agent Index</div>
        <div class="stat-desc">Meta-index of agent repos</div>
      </a>
    </div>

    <p class="updated-at" id="updatedAt"></p>
  </div>

  <script>
    // ===== Animated counter =====
    function animateCount(el, target, duration) {
      if (duration === undefined) duration = 2000;
      var start = 0;
      var startTime = null;
      function step(ts) {
        if (!startTime) startTime = ts;
        var progress = Math.min((ts - startTime) / duration, 1);
        var eased = 1 - Math.pow(1 - progress, 3);
        var current = Math.floor(eased * target);
        el.textContent = current.toLocaleString();
        if (progress < 1) {
          requestAnimationFrame(step);
        } else {
          el.textContent = target.toLocaleString();
        }
      }
      requestAnimationFrame(step);
    }

    // ===== Load stats from JSON =====
    var statsData = {
      articles: 33,
      papers: 977,
      agents: 665
    };

    // Try to fetch live stats
    function loadLiveStats() {
      fetch('./articles/tech-feed.json', { cache: 'no-store' })
        .then(function(r) { return r.json(); })
        .then(function(items) {
          statsData.articles = 3 + items.length;
          animateCount(document.getElementById('numArticles'), statsData.articles);
        })
        .catch(function() {
          animateCount(document.getElementById('numArticles'), statsData.articles);
        });

      fetch('https://greasebig.github.io/awesome-agent-everything/data/repos.min.json', { cache: 'no-store' })
        .then(function(r) { return r.json(); })
        .then(function(data) {
          var total = 0;
          Object.keys(data).forEach(function(k) {
            if (Array.isArray(data[k])) total += data[k].length;
          });
          if (total > 0) statsData.agents = total;
          animateCount(document.getElementById('numAgents'), statsData.agents);
        })
        .catch(function() {
          animateCount(document.getElementById('numAgents'), statsData.agents);
        });
    }

    // Start animation with fallback values
    animateCount(document.getElementById('numArticles'), statsData.articles);
    animateCount(document.getElementById('numPapers'), statsData.papers);
    animateCount(document.getElementById('numAgents'), statsData.agents);

    // Then try live
    loadLiveStats();

    // Show updated time
    var now = new Date();
    document.getElementById('updatedAt').textContent =
      'Updated: ' + now.getFullYear() + '-' +
      String(now.getMonth()+1).padStart(2,'0') + '-' +
      String(now.getDate()).padStart(2,'0') + ' ' +
      String(now.getHours()).padStart(2,'0') + ':' +
      String(now.getMinutes()).padStart(2,'0');

    // ===== Progressive Video Loading =====
    // Strategy: Keep initial frosted-glass background → XHR download 480p → fade in video → XHR download large → switch at same timestamp
    (function() {
      if (window.matchMedia('(prefers-reduced-motion: reduce)').matches) return;

      var video = document.getElementById('bgVideo');
      var videoBg = document.getElementById('videoBg');
      var loading = document.getElementById('videoLoading');
      var loadingDot = loading ? loading.querySelector('.vlb-dot') : null;
      var loadingText = loading ? loading.querySelector('.vlb-text') : null;
      var loadingTimeout;
      var hasSwitchedToLarge = false;

      video.loop = true;

      function showLoading(text) {
        if (loadingText) loadingText.textContent = text;
        loading.classList.add('visible');
        clearTimeout(loadingTimeout);
      }
      function hideLoading() {
        loadingTimeout = setTimeout(function() {
          loading.classList.remove('visible');
        }, 3000);
      }

      // Guarantee seamless loop
      video.addEventListener('ended', function() {
        video.currentTime = 0;
        video.play();
      });

      // Step 1: Download 480p video via XHR blob
      var smallReq = new XMLHttpRequest();
      smallReq.open('GET', 'assets/videos/bg-480p.mp4', true);
      smallReq.responseType = 'blob';
      smallReq.onprogress = function(e) {
        if (e.lengthComputable) {
          var pct = Math.round(e.loaded / e.total * 100);
          showLoading('Loading 480p… ' + pct + '%');
        }
      };
      smallReq.onload = function() {
        if (smallReq.status !== 200) {
          showLoading('Loading original…');
          startDownloadingLarge();
          return;
        }
        var smallBlob = URL.createObjectURL(smallReq.response);
        var probe = document.createElement('video');
        probe.muted = true;
        probe.src = smallBlob;
        probe.addEventListener('canplaythrough', function() {
          video.loop = true;
          video.src = smallBlob;
          video.play().then(function() {
            videoBg.classList.add('visible');
            showLoading('480p ✓ · Loading original…');
            startDownloadingLarge();
          }).catch(function() {
            videoBg.classList.add('visible');
            showLoading('480p ✓ · Loading original…');
            startDownloadingLarge();
          });
        }, { once: true });
        probe.addEventListener('error', function() {
          // 480p not playable, try large directly
          showLoading('Loading original…');
          startDownloadingLarge();
        }, { once: true });
        probe.load();
      };
      smallReq.onerror = function() {
        showLoading('Loading original…');
        startDownloadingLarge();
      };
      showLoading('Loading 480p…');
      smallReq.send();

      // Step 2: Download large video in background
      function startDownloadingLarge() {
        if (hasSwitchedToLarge) return;
        var req = new XMLHttpRequest();
        req.open('GET', 'assets/videos/bg-large.mp4', true);
        req.responseType = 'blob';
        req.onprogress = function(e) {
          if (e.lengthComputable) {
            var pct = Math.round(e.loaded / e.total * 100);
            showLoading('Loading original… ' + pct + '%');
          }
        };
        req.onload = function() {
          if (req.status === 200 && !hasSwitchedToLarge) {
            var blobUrl = URL.createObjectURL(req.response);
            var probe = document.createElement('video');
            probe.muted = true;
            probe.src = blobUrl;
            probe.addEventListener('canplaythrough', function() {
              if (hasSwitchedToLarge) return;
              hasSwitchedToLarge = true;
              // Calculate same playback position
              var ratio = video.currentTime / video.duration;
              var targetTime = ratio * probe.duration;
              // Switch: brief fade out, swap source, fade in
              videoBg.classList.remove('visible');
              setTimeout(function() {
                video.src = blobUrl;
                video.loop = true;
                video.currentTime = targetTime;
                video.play().then(function() {
                  videoBg.classList.add('visible');
                  if (loadingDot) loadingDot.classList.add('done');
                  showLoading('Original ✓');
                  hideLoading();
                }).catch(function() {
                  videoBg.classList.add('visible');
                  if (loadingDot) loadingDot.classList.add('done');
                  showLoading('Original ✓');
                  hideLoading();
                });
              }, 400);
            }, { once: true });
            probe.addEventListener('error', function() {
              showLoading('480p (original unavailable)');
              hideLoading();
            }, { once: true });
            probe.load();
          } else if (!hasSwitchedToLarge) {
            showLoading('480p ✓');
            hideLoading();
          }
        };
        req.onerror = function() {
          showLoading('480p ✓');
          hideLoading();
        };
        req.send();
      }
    })();
  </script>
</body>
</html>
