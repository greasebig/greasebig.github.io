name: Daily Tech Article Reposts

on:
  schedule:
    - cron: '30 1 * * *'
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: daily-tech-article-reposts
  cancel-in-progress: false

jobs:
  update-feed:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Sync with main
        run: |
          git pull --rebase origin main || true

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Fetch fresh technology links
        run: |
          python scripts/fetch_tech_articles.py

      - name: Commit and push feed
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          git add articles/tech-feed.json
          if git diff --staged --quiet; then
            echo "No new reposted articles"
          else
            git commit -m "Update reposted tech articles - $(date -u +'%Y-%m-%d')"
            git push
          fi
